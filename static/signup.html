<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>회원가입 - Todo List</title>
  <script>
    (function () {
      var stored = localStorage.getItem('theme');
      var theme = stored === 'light' || stored === 'dark'
        ? stored
        : (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.dataset.theme = theme;
    })();
  </script>
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="../manifest.json">
  <meta name="theme-color" content="#2563eb">
</head>
<body>
  <main class="app auth-app">
    <h1>회원가입</h1>
    <form id="signup-form" class="auth-form">
      <input id="nickname" type="text" placeholder="닉네임" autocomplete="nickname" required>
      <input id="email" type="email" placeholder="이메일" autocomplete="email" required>
      <input id="password" type="password" placeholder="비밀번호 (6자 이상)" autocomplete="new-password" required>
      <button type="submit">회원가입</button>
    </form>
    <p id="error-message" class="error-message"></p>
    <p id="success-message" class="success-message"></p>
    <div class="oauth-divider">또는</div>
    <div class="oauth-buttons">
      <button type="button" class="oauth-btn oauth-btn-google" id="google-login">Google로 계속하기</button>
      <button type="button" class="oauth-btn oauth-btn-github" id="github-login">GitHub로 계속하기</button>
    </div>
    <p class="auth-switch">이미 계정이 있으신가요? <a href="login.html">로그인</a></p>
  </main>
  <script type="module">
    import { signUp, signInWithOAuth, redirectIfAuthed } from './js/auth.js';

    redirectIfAuthed();

    const form = document.getElementById('signup-form');
    const errorMessage = document.getElementById('error-message');
    const successMessage = document.getElementById('success-message');

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      errorMessage.textContent = '';
      successMessage.textContent = '';

      const nickname = document.getElementById('nickname').value;
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      try {
        const { data, error } = await signUp({ email, password, nickname });
        if (error) {
          errorMessage.textContent = error.message;
          return;
        }
        if (data.session) {
          window.location.href = '../index.html';
          return;
        }
        successMessage.textContent = '회원가입이 완료되었습니다. 로그인 페이지로 이동해주세요.';
        form.reset();
      } catch (err) {
        errorMessage.textContent = err.message;
      }
    });

    document.getElementById('google-login').addEventListener('click', async () => {
      errorMessage.textContent = '';
      const { error } = await signInWithOAuth('google');
      if (error) errorMessage.textContent = error.message;
    });

    document.getElementById('github-login').addEventListener('click', async () => {
      errorMessage.textContent = '';
      const { error } = await signInWithOAuth('github');
      if (error) errorMessage.textContent = error.message;
    });
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('../sw.js');
    }
  </script>
</body>
</html>
