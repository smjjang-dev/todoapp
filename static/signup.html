<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://esm.sh 'sha256-qrm+vxc1woHc8ZhJWHNUk0eS0Z4RC1I/j4n/y6HTL9A='; style-src 'self'; img-src 'self'; connect-src 'self' https://mkwodsholwmsgazddrqp.supabase.co wss://mkwodsholwmsgazddrqp.supabase.co; manifest-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'">
  <title>회원가입 - Todo List</title>
  <script>
    (function () {
      var stored = localStorage.getItem('theme');
      var theme = stored === 'light' || stored === 'dark'
        ? stored
        : (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.dataset.theme = theme;
    })();
  </script>
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="../manifest.json">
  <meta name="theme-color" content="#2563eb">
</head>
<body>
  <main class="app auth-app">
    <h1>회원가입</h1>
    <form id="signup-form" class="auth-form">
      <input id="nickname" type="text" placeholder="닉네임" autocomplete="nickname" required>
      <input id="email" type="email" placeholder="이메일" autocomplete="email" required>
      <input id="password" type="password" placeholder="비밀번호 (8자 이상, 영문+숫자 포함)" autocomplete="new-password" required minlength="8">
      <button type="submit">회원가입</button>
    </form>
    <p id="error-message" class="error-message"></p>
    <p id="success-message" class="success-message"></p>
    <div class="oauth-divider">또는</div>
    <div class="oauth-buttons">
      <button type="button" class="oauth-btn oauth-btn-google" id="google-login">Google로 계속하기</button>
      <button type="button" class="oauth-btn oauth-btn-github" id="github-login">GitHub로 계속하기</button>
    </div>
    <p class="auth-switch">이미 계정이 있으신가요? <a href="login.html">로그인</a></p>
  </main>
  <script type="module" src="js/signupPage.js"></script>
</body>
</html>
