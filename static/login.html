<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인 - Todo List</title>
  <script>
    (function () {
      var stored = localStorage.getItem('theme');
      var theme = stored === 'light' || stored === 'dark'
        ? stored
        : (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.dataset.theme = theme;
    })();
  </script>
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="../manifest.json">
  <meta name="theme-color" content="#2563eb">
</head>
<body>
  <main class="app auth-app">
    <h1>로그인</h1>
    <form id="login-form" class="auth-form">
      <input id="email" type="email" placeholder="이메일" autocomplete="email" required>
      <input id="password" type="password" placeholder="비밀번호" autocomplete="current-password" required>
      <button type="submit" class="icon-submit-btn" aria-label="로그인">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
        </svg>
      </button>
    </form>
    <p id="error-message" class="error-message"></p>
    <div class="oauth-divider">또는</div>
    <div class="oauth-buttons">
      <button type="button" class="oauth-btn oauth-btn-google" id="google-login">Google로 계속하기</button>
      <button type="button" class="oauth-btn oauth-btn-github" id="github-login">GitHub로 계속하기</button>
    </div>
    <p class="auth-switch">계정이 없으신가요? <a href="signup.html">회원가입</a></p>
  </main>
  <script type="module">
    import { signIn, signInWithOAuth, redirectIfAuthed } from './js/auth.js';

    redirectIfAuthed();

    const form = document.getElementById('login-form');
    const errorMessage = document.getElementById('error-message');

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      errorMessage.textContent = '';
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      const { error } = await signIn({ email, password });
      if (error) {
        errorMessage.textContent = error.message;
        return;
      }
      window.location.href = '../index.html';
    });

    document.getElementById('google-login').addEventListener('click', async () => {
      errorMessage.textContent = '';
      const { error } = await signInWithOAuth('google');
      if (error) errorMessage.textContent = error.message;
    });

    document.getElementById('github-login').addEventListener('click', async () => {
      errorMessage.textContent = '';
      const { error } = await signInWithOAuth('github');
      if (error) errorMessage.textContent = error.message;
    });
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('../sw.js');
    }
  </script>
</body>
</html>
