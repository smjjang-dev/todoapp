<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo List</title>
  <link rel="stylesheet" href="static/css/style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2563eb">
</head>
<body>
  <main class="app">
    <header class="app-header">
      <h1>Todo List</h1>
      <div class="header-actions">
        <span id="greeting" class="greeting"></span>
        <button id="logout-btn" type="button" class="logout-btn">로그아웃</button>
      </div>
    </header>
    <form id="todo-form">
      <input id="todo-input" type="text" placeholder="할 일을 입력하세요" autocomplete="off" required>
      <select id="priority-select">
        <option value="high">상</option>
        <option value="medium" selected>중</option>
        <option value="low">하</option>
      </select>
      <button type="submit">추가</button>
    </form>
    <ul id="todo-list"></ul>
  </main>
  <script type="module" src="static/js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
</body>
</html>
