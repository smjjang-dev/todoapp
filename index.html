<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://esm.sh 'sha256-qrm+vxc1woHc8ZhJWHNUk0eS0Z4RC1I/j4n/y6HTL9A='; style-src 'self'; img-src 'self'; connect-src 'self' https://mkwodsholwmsgazddrqp.supabase.co wss://mkwodsholwmsgazddrqp.supabase.co; manifest-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'">
  <title>Todo List</title>
  <script>
    (function () {
      var stored = localStorage.getItem('theme');
      var theme = stored === 'light' || stored === 'dark'
        ? stored
        : (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.dataset.theme = theme;
    })();
  </script>
  <link rel="stylesheet" href="static/css/style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2563eb">
</head>
<body>
  <main class="app todo-app">
    <header class="app-header">
      <div class="header-title">
        <button id="theme-toggle" type="button" class="theme-toggle" aria-label="다크모드 전환" aria-pressed="false">
          <svg class="icon-sun" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
          </svg>
          <svg class="icon-moon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
        </button>
        <h1>Todo List</h1>
      </div>
      <div class="header-actions">
        <span id="greeting" class="greeting"></span>
        <button id="logout-btn" type="button" class="logout-btn" aria-label="로그아웃"></button>
      </div>
    </header>
    <div id="current-clock" class="current-clock"></div>
    <p id="status-message" class="error-message" role="status" aria-live="polite"></p>
    <div class="progress-wrap">
      <span id="progress-text" class="progress-text"></span>
      <div class="progress-bar"><div id="progress-bar-fill" class="progress-bar-fill"></div></div>
    </div>
    <form id="todo-form">
      <input id="todo-input" type="text" placeholder="할 일을 입력하세요" autocomplete="off" required>
      <select id="priority-select">
        <option value="high">상</option>
        <option value="medium" selected>중</option>
        <option value="low">하</option>
      </select>
      <button type="submit" class="icon-submit-btn" aria-label="추가"></button>
    </form>
    <ul id="todo-list"></ul>
  </main>
  <footer class="site-footer">
    copyleft 2026 smjjang | <a href="README.html" target="_blank" rel="noopener">사용법</a>
  </footer>
  <script type="module" src="static/js/app.js"></script>
</body>
</html>
